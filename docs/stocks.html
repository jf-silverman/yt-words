<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mad Money · Stock Lookup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, Arial, sans-serif;
      background: #f6f8fa;
      color: #24292f;
      padding: 24px 16px 48px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #57606a; font-size: 14px; margin-bottom: 20px; }
    .subtitle a { color: #0969da; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }

    /* Search */
    .search-wrap { margin-bottom: 8px; }
    #search {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      outline: none;
      background: #fff;
    }
    #search:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
    .search-options {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
      color: #57606a;
    }
    .search-options input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
    .search-options label { cursor: pointer; user-select: none; }
    .status { margin-top: 6px; font-size: 13px; color: #57606a; min-height: 18px; }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .card-company { font-size: 18px; font-weight: 700; }
    .card-ticker {
      font-family: monospace;
      font-size: 14px;
      background: #0969da;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .mention-count { font-size: 12px; color: #57606a; margin-left: auto; }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 8px 12px;
      background: #f6f8fa;
      border-bottom: 2px solid #d0d7de;
      white-space: nowrap;
      color: #57606a;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    td { padding: 8px 12px; border-bottom: 1px solid #eaeef2; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f6f8fa; }

    .date-cell { white-space: nowrap; font-family: monospace; font-size: 12px; color: #57606a; }
    .sent-cell { line-height: 2; }
    .price-cell { white-space: nowrap; font-family: monospace; }
    .target-cell { white-space: nowrap; font-family: monospace; color: #57606a; line-height: 2; }
    .seg-cell { font-size: 12px; color: #57606a; line-height: 2; white-space: nowrap; }
    .note-cell { color: #24292f; line-height: 1.5; max-width: 300px; }
    .note-block { margin-bottom: 0; }

    /* Sentiment badges */
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    /* Empty / loading */
    .empty { text-align: center; padding: 48px 16px; color: #57606a; }
    .empty .big { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Mad Money · Stock Lookup</h1>
  <p class="subtitle">
    Every stock Cramer has mentioned on Mad Money, with sentiment and closing price.
    &nbsp;·&nbsp; <a href="index.html">← Home</a>
  </p>

  <div class="search-wrap">
    <input id="search" type="text" placeholder="Ticker prefix (e.g. MU, NV)…" autofocus autocomplete="off">
    <div class="search-options">
      <input type="checkbox" id="nameMode">
      <label for="nameMode">Search by company name instead</label>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div id="results"></div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/jf-silverman/yt-words/main/data/stock_sentiments.json';


const SENTIMENT_COLORS = {
  strong_buy:     '#1a7f37',
  buy:            '#2da44e',
  buy_on_pullback:'#4ac26b',
  mild_buy:       '#80e09a',
  hold:           '#d4a017',
  wait:           '#f0c040',
  caution:        '#f0a030',
  neutral:        '#8b949e',
  concern:        '#e06060',
  avoid:          '#d03030',
  sell:           '#a00000',
};

function sentimentBadge(s) {
  const color = SENTIMENT_COLORS[s] || '#8b949e';
  const label = (s || 'unknown').replace(/_/g, ' ').toUpperCase();
  return `<span class="badge" style="background:${color}">${label}</span>`;
}

function humanizeSegment(s) {
  return (s || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function fmtPrice(p) {
  return p != null ? `$${Number(p).toFixed(2)}` : '—';
}

// Group mentions by date, aggregating multiple same-date entries into one row
function groupByDate(mentions) {
  const byDate = {};
  for (const m of mentions) {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  }
  return Object.entries(byDate).sort(([a], [b]) => b.localeCompare(a));
}

function renderCard(ticker, entry) {
  const dateGroups = groupByDate(entry.mentions || []);

  const rows = dateGroups.map(([date, group]) => {
    // Closing price — take first available across all mentions on this date
    const closePrice = fmtPrice((group.find(m => m.closing_price != null) || {}).closing_price);

    // Deduplicate by segment: keep one mention per segment, preferring the longest note
    const SEGMENT_PRIORITY = [
      'in_depth_analysis', 'interview', 'opening_commentary',
      'closing_commentary', 'caller_qa', 'lightning_round',
    ];
    const bySegment = {};
    for (const m of group) {
      const seg = m.segment || '';
      if (!bySegment[seg] || (m.note || '').length > (bySegment[seg].note || '').length) {
        bySegment[seg] = m;
      }
    }
    const deduped = Object.values(bySegment).sort((a, b) => {
      const pa = SEGMENT_PRIORITY.indexOf(a.segment);
      const pb = SEGMENT_PRIORITY.indexOf(b.segment);
      return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
    });

    // Sentiments and targets — one per unique segment, in priority order
    const sentiments = deduped.map(m => sentimentBadge(m.sentiment)).join('<br>');
    const targets = deduped.map(m =>
      m.price_target != null ? fmtPrice(m.price_target) :
      m.price_level  != null ? fmtPrice(m.price_level)  : '—'
    ).join('<br>');
    const segments = deduped.map(m => humanizeSegment(m.segment)).join('<br>');

    // Consolidated note: unique notes joined into one paragraph (in-depth/interview first)
    const seenNotes = new Set();
    const noteParts = [];
    for (const m of deduped) {
      const n = (m.note || '').trim();
      if (n && !seenNotes.has(n)) { seenNotes.add(n); noteParts.push(n); }
    }
    const notes = `<div class="note-block">${noteParts.join(' ')}</div>`;

    return `<tr>
      <td class="date-cell">${date}</td>
      <td class="sent-cell">${sentiments}</td>
      <td class="price-cell">${closePrice}</td>
      <td class="target-cell">${targets}</td>
      <td class="seg-cell">${segments}</td>
      <td class="note-cell">${notes}</td>
    </tr>`;
  }).join('');

  const dayCount = dateGroups.length;
  return `<div class="card">
    <div class="card-header">
      <span class="card-company">${entry.company || ticker}</span>
      <span class="card-ticker">${ticker}</span>
      <span class="mention-count">${dayCount} episode${dayCount !== 1 ? 's' : ''}</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Date</th><th>Sentiment</th><th>Close</th>
          <th>Cramer Target</th><th>Segment</th><th>Note</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

let db = null;

async function loadData() {
  document.getElementById('status').textContent = 'Loading data…';
  try {
    const resp = await fetch(DATA_URL);
    db = await resp.json();
    document.getElementById('status').textContent =
      `${Object.keys(db.stocks || {}).length} tickers loaded. Start typing to search.`;
  } catch (e) {
    document.getElementById('status').textContent = 'Failed to load data. Try refreshing.';
  }
}

function search() {
  const resultsEl = document.getElementById('results');
  const statusEl  = document.getElementById('status');
  const query     = document.getElementById('search').value.trim();
  const nameMode  = document.getElementById('nameMode').checked;

  if (!db) { statusEl.textContent = 'Still loading…'; return; }

  if (!query) {
    resultsEl.innerHTML = '';
    statusEl.textContent =
      `${Object.keys(db.stocks || {}).length} tickers loaded. Start typing to search.`;
    return;
  }

  const q = query.toUpperCase();
  const stocks = db.stocks || {};
  let matches;

  if (nameMode) {
    // Company name substring match
    matches = Object.entries(stocks).filter(([, entry]) =>
      (entry.company || '').toUpperCase().includes(q)
    ).sort(([a], [b]) => a.localeCompare(b));
  } else {
    // Ticker prefix match only
    matches = Object.entries(stocks).filter(([ticker]) =>
      ticker.startsWith(q)
    ).sort(([a], [b]) => a.localeCompare(b));
  }

  if (matches.length === 0) {
    resultsEl.innerHTML = `<div class="empty">
      <div class="big">🔍</div>
      <div>No results for <strong>${query}</strong></div>
    </div>`;
    statusEl.textContent = '';
    return;
  }

  statusEl.textContent = `${matches.length} result${matches.length !== 1 ? 's' : ''}`;
  resultsEl.innerHTML = matches.map(([t, e]) => renderCard(t, e)).join('');
}

document.getElementById('search').addEventListener('input', search);
document.getElementById('nameMode').addEventListener('change', () => {
  const nameMode = document.getElementById('nameMode').checked;
  document.getElementById('search').placeholder =
    nameMode ? 'Company name (e.g. Nvidia, Honeywell)…' : 'Ticker prefix (e.g. MU, NV)…';
  search();
});
loadData();
</script>
</body>
</html>
