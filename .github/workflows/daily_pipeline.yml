name: Mad Money Daily Pipeline

on:
  schedule:
    # 2:07 AM UTC Tue–Sat = ~10 PM ET Mon–Fri (works in both EDT and EST)
    # Mad Money airs 6 PM ET; YouTube upload typically lands by 8–9 PM ET
    - cron: '7 2 * * 2-6'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed for git push inside pipeline.py

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests yt-dlp

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          python3 -c "
          import os, sys
          c = os.environ.get('YOUTUBE_COOKIES', '')
          if not c.strip():
              print('WARNING: YOUTUBE_COOKIES secret is empty')
              sys.exit(1)
          with open('/tmp/yt_cookies.txt', 'w') as f:
              f.write(c)
          print(f'Cookie file written: {c.count(chr(10))} lines, {len(c)} bytes')
          "

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OVERCAST_EMAIL: ${{ secrets.OVERCAST_EMAIL }}
          OVERCAST_PASSWORD: ${{ secrets.OVERCAST_PASSWORD }}
          YOUTUBE_COOKIE_FILE: /tmp/yt_cookies.txt
        run: python code/pipeline.py --email-mode smtp
